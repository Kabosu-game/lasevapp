<VirtualHost *:80>
    ServerName 72.60.124.186
    ServerAlias api.lasev.com
    ServerAdmin webmaster@lasev.com
    
    DocumentRoot /var/www/lasev/api/public

    <Directory /var/www/lasev/api/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Rewrite rules pour Laravel
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/lasev-api-error.log
    CustomLog ${APACHE_LOG_DIR}/lasev-api-access.log combined

    # Sécurité
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"

    # Taille max des uploads
    php_value upload_max_filesize 100M
    php_value post_max_size 100M
    php_value max_execution_time 300
    php_value max_input_time 300
</VirtualHost>

