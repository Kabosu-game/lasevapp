name: meditation_app
description: Application mobile de méditation
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.5
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  flutter_staggered_animations: ^1.1.1
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  video_player: ^2.8.1
  flutter_secure_storage: ^9.0.0
  # Paiements
  flutter_stripe: ^11.0.0
  webview_flutter: ^4.8.0
  dio: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/image_bg/
    - assets/videos/
